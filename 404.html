<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Gateway</title>
    
    <link rel="icon" type="image/x-icon" href="https://i.pinimg.com/736x/2b/7d/10/2b7d103bfadc92765cce6c79a5ab6924.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --text-main: #ffffff;
            --text-muted: #a0aec0;
            --bg-dark: #0a0b10;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Quicksand', sans-serif;
            color: var(--text-main);
            background-color: var(--bg-dark);
            
            /* Lớp phủ đen và background Anime y hệt trang chủ */
            background-image: 
                linear-gradient(rgba(10, 11, 16, 0.85), rgba(10, 11, 16, 0.95)), 
                url('https://i.pinimg.com/1200x/bc/83/1a/bc831a577b896863f4dfab76d18c3705.jpg');
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .noise-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03; pointer-events: none; z-index: 1;
        }

        .error-container {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }

        .evil-cat {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 12px; /* Bo góc nhẹ cho giống ảnh mẫu */
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            /* Thêm tí hiệu ứng lơ lửng cho đỡ cứng */
            animation: floatCat 4s ease-in-out infinite;
        }

        @keyframes floatCat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .error-desc {
            font-size: 16px;
            line-height: 1.6;
            color: #e2e8f0;
            margin-bottom: 8px;
        }

        .error-desc a {
            color: #ffffff;
            text-decoration: underline;
            font-weight: 600;
            text-underline-offset: 3px;
            transition: 0.2s;
        }

        .error-desc a:hover {
            color: #ffb7c5; /* Sáng màu hồng khi đưa chuột vào */
            text-decoration: none;
        }

        .kidnap-text {
            font-size: 15px;
            font-style: italic;
            color: var(--text-muted);
        }
        
        @media (max-width: 600px) {
            h1 { font-size: 26px; }
            .error-desc { font-size: 15px; }
            .error-desc br { display: none; } /* Chống rớt dòng xấu trên điện thoại */
        }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>

    <div class="error-container">
        <img src="https://i.ibb.co/LDhxx8w1/image.png" alt="Evil Larry" class="evil-cat">
        
        <h1>404 - Page Not Found</h1>
        
        <p class="error-desc">Oops! The page you're looking for doesn't exist. It might have been<br>moved or deleted. Please check the URL or return to the <a href="/">home page</a>.</p>
        
        <p class="kidnap-text">Or hakoxjnk will assault you!</p>
    </div>

</body>
</html>
